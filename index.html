<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>밥알이야</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root {
  --gochu:#E1492B; --gochu2:#BF3A20;
  --soot:#2A241D; --soft:#7A6E63;
  --rice:#FBF6EC; --rice2:#F2E8D5;
  --line:#E8DECE; --card:#FFFFFF;
  --green:#7C9A3B;
  --sh1:0 2px 12px rgba(60,45,25,.07);
  --sh2:0 8px 28px rgba(60,45,25,.11);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#E8DFD0;font-family:'Noto Sans KR',sans-serif;color:var(--soot)}

.phone{max-width:430px;margin:0 auto;min-height:100vh;background:var(--rice);
  display:flex;flex-direction:column;position:relative;overflow:hidden;
  box-shadow:0 0 80px rgba(40,28,12,.22)}
@media(min-width:480px){.phone{margin:20px auto;min-height:calc(100vh - 40px);border-radius:36px}}

/* 상단 */
.topbar{padding:16px 18px 12px;background:var(--rice);position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.logo{font-family:'Jua';font-size:22px;color:var(--gochu);letter-spacing:-.3px}
.logo small{font-family:'Noto Sans KR';font-size:9px;font-weight:600;color:var(--soft);letter-spacing:2px;display:block;margin-top:-3px}
.user-btn{display:flex;align-items:center;gap:6px;background:var(--soot);color:#fff;
  border-radius:99px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR'}
.user-btn .sg{font-family:'Jua';color:#E8C36A}

.scroll{flex:1;overflow-y:auto;padding-bottom:96px}
.pad{padding:16px 18px}

.sec-h{display:flex;align-items:baseline;justify-content:space-between;padding:18px 18px 10px}
.sec-t{font-family:'Jua';font-size:17px;letter-spacing:-.3px}
.sec-sub{font-size:11px;color:var(--soft);font-weight:700}

/* 인사 */
.greet-wrap{padding:16px 18px 4px}
.greet{font-family:'Jua';font-size:21px;letter-spacing:-.4px;line-height:1.35}
.greet em{color:var(--gochu);font-style:normal}
.greet-sub{font-size:12px;color:var(--soft);margin-top:5px}

/* 카드 공통 */
.card{margin:0 18px 10px;background:var(--card);border:1px solid var(--line);
  border-radius:18px;padding:14px 15px;box-shadow:var(--sh1);cursor:pointer;transition:transform .13s}
.card:active{transform:scale(.985)}
.rname{font-weight:800;font-size:15.5px;letter-spacing:-.3px}
.rmeta{font-size:11px;color:var(--soft);margin-top:2px}
.badge{display:inline-block;background:var(--gochu);color:#fff;font-size:9.5px;font-weight:700;
  padding:2px 8px;border-radius:99px;margin-left:6px;vertical-align:2px}
.badge.g{background:var(--green)}
.memo-line{font-size:12px;color:#5a4f44;background:var(--rice2);border-radius:9px;
  padding:7px 10px;margin-top:9px;line-height:1.5;border-left:3px solid var(--gochu)}
.reason{display:inline-flex;align-items:center;gap:4px;background:#E8F3DA;color:#4a7a1e;
  border-radius:99px;padding:4px 10px;font-size:11px;font-weight:700;margin-top:9px}
.wish-reason{background:#FFF3E0;border-radius:13px;border-bottom-left-radius:4px;
  padding:9px 13px;margin-top:9px;font-size:12.5px;color:#7a5a2e;line-height:1.5}

/* 공기밥 SVG */
.bowl{display:block;flex-shrink:0}

/* 밥알 도트 (재료별 세부 점수) */
.dots{display:flex;gap:1.5px;flex-wrap:wrap}
.dg{width:8px;height:12px;border-radius:50% 50% 48% 48%/62% 62% 38% 38%;
  transform:rotate(-12deg);border:1.2px solid;display:inline-block}

/* 빈 상태 */
.empty{text-align:center;padding:28px 24px;color:var(--soft);font-size:13px;line-height:1.8}
.empty .big{font-size:36px;margin-bottom:8px}
.empty b{color:var(--gochu)}

/* 버튼 */
.btn-p{width:100%;background:linear-gradient(140deg,var(--gochu),var(--gochu2));color:#fff;
  border:none;border-radius:15px;padding:16px;font-family:'Jua';font-size:16px;cursor:pointer;
  box-shadow:0 5px 18px rgba(225,73,43,.26);transition:.13s}
.btn-p:active{transform:scale(.985)}
.btn-p:disabled{background:#D8C9B2;box-shadow:none}
.btn-s{width:100%;background:var(--rice2);color:var(--soot);border:none;border-radius:15px;
  padding:14px;font-family:'Jua';font-size:14px;cursor:pointer}
.btn-row{display:flex;gap:8px}
.btn-row>*{flex:1}

/* 입력 */
.field{margin-bottom:13px}
.field label{display:block;font-weight:700;font-size:12.5px;margin-bottom:7px;color:var(--soft)}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:13px;
  padding:12px 14px;font-family:'Noto Sans KR';font-size:14px;background:var(--card);color:var(--soot);outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gochu)}
.field textarea{resize:none;height:74px}

/* 태그 칩 */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 13px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);
  font-size:12px;font-weight:700;color:var(--soft);cursor:pointer;transition:.12s;font-family:'Noto Sans KR'}
.chip.on{border-color:var(--gochu);background:var(--gochu);color:#fff}

/* 점수 행 */
.score-row{background:var(--card);border:1px solid var(--line);border-radius:13px;
  padding:11px 13px;margin-bottom:8px}
.score-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.score-nm{font-weight:700;font-size:13px}
.score-nm small{font-size:10px;color:var(--soft);font-weight:500;margin-left:4px}
.score-v{font-family:'Jua';font-size:14px;color:var(--gochu)}
.gpick{display:flex;gap:6px;flex-wrap:wrap}
.gpick .dg{width:22px;height:30px;border-width:2px;cursor:pointer;transition:transform .1s}
.gpick .dg:active{transform:rotate(-12deg) scale(.85)}

/* 계란후라이 토글 */
.egg-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--card);border:2px dashed var(--line);border-radius:14px;padding:13px;
  font-family:'Jua';font-size:14px;color:var(--soft);cursor:pointer;transition:.15s}
.egg-btn.on{background:#FFF6DD;border:2px solid #F5B400;color:#8a6600}
.egg-ico{font-size:18px}

/* 지갑 */
.wallet{background:linear-gradient(150deg,var(--soot),#3c2e1e);border-radius:22px;padding:22px;
  color:#fff;box-shadow:var(--sh2);text-align:center;position:relative;overflow:hidden;margin:0 18px 14px}
.wallet::after{content:"🌾";position:absolute;right:-6px;bottom:-16px;font-size:86px;opacity:.1}
.wallet .cap{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.65)}
.wallet .amt{font-family:'Jua';font-size:48px;color:#E8C36A;line-height:1.2}
.wallet .sub{font-size:11.5px;color:rgba(255,255,255,.7);margin-top:3px}

/* 랭킹 */
.rank-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px dashed var(--line)}
.rank-item:last-child{border-bottom:none}
.rank-no{font-family:'Jua';font-size:16px;color:var(--gochu);min-width:22px}
.rank-info{flex:1}
.rank-nick{font-weight:700;font-size:13.5px}
.rank-meta{font-size:10.5px;color:var(--soft)}
.rank-sg{font-family:'Jua';font-size:13px;color:var(--soot)}

/* 탭바 */
.tabbar{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(255,255,255,.97);
  border-top:1px solid var(--line);padding:8px 0 calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(12px);z-index:40}
.tab{flex:1;text-align:center;font-size:9.5px;color:var(--soft);font-weight:700;border:none;background:none;cursor:pointer;font-family:'Noto Sans KR';padding:0 1px}
.tab .ti{font-size:19px;display:block;margin-bottom:2px;filter:grayscale(1);opacity:.45}
.tab.on{color:var(--gochu)}
.tab.on .ti{filter:none;opacity:1}

/* 토스트 */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(16px);
  background:var(--soot);color:#fff;padding:11px 18px;border-radius:13px;font-size:12.5px;font-weight:700;
  opacity:0;transition:.28s;z-index:99;pointer-events:none;max-width:85%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 로딩 */
.spin{display:inline-block;width:14px;height:14px;border:2.5px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-note{text-align:center;font-size:12px;color:var(--soft);padding:20px}
</style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <div class="logo">밥알이야 <small>BABALEEYA</small></div>
    <button class="user-btn" id="userBtn">🍙 <span id="uNick">...</span> <span class="sg" id="uSg">0가마</span></button>
  </div>

  <div class="scroll" id="scroll">
    <div class="loading-note" id="bootNote">🍚 밥알 데이터 불러오는 중...</div>
    <div id="viewRoot"></div>
  </div>

  <div class="tabbar">
    <button class="tab on" data-v="home" onclick="go('home')"><span class="ti">🍚</span>오늘 밥</button>
    <button class="tab" data-v="places" onclick="go('places')"><span class="ti">🍱</span>공기밥</button>
    <button class="tab" data-v="write" onclick="go('write')"><span class="ti">✍️</span>밥알 남기기</button>
    <button class="tab" data-v="my" onclick="go('my')"><span class="ti">📖</span>내 밥역사</button>
    <button class="tab" data-v="wallet" onclick="go('wallet')"><span class="ti">🌾</span>쌀가마</button>
    <button class="tab" data-v="wish" onclick="go('wish')"><span class="ti">🧺</span>밥바구니</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase (compat SDK: 일반 <script> 전역 스코프와 그대로 호환) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ══════════ 카테고리별 밥알 축 ══════════ */
const AXES = {
  restaurant: {
    emoji:'🍚', label:'식당',
    grains: [
      {k:'taste',  n:'맛',                  g:'백미',   max:10, c:'#D9B65A', bg:'#FBF6EC'},
      {k:'access', n:'접근성',              g:'검은콩', max:7,  c:'#4A3F73', bg:'#2A2540'},
      {k:'vibe',   n:'인테리어',            g:'완두콩', max:7,  c:'#6E9636', bg:'#8FB94A'},
      {k:'clean',  n:'청결',                g:'병아리콩',max:7, c:'#B79A46', bg:'#D9C27E'},
      {k:'con',    n:'단점',                g:'흑미',   max:7,  c:'#000000', bg:'#1A1512', qualityInverse:true},
      {k:'value',  n:'가성비',              g:'현미',   max:7,  c:'#8C5F30', bg:'#B5824B'},
      {k:'service',n:'서비스',              g:'누룽지', max:7,  c:'#B5751F', bg:'#D9963A'},
      {k:'mood',   n:'화장실·분위기·향',     g:'강낭콩', max:7,  c:'#6B2B2B', bg:'#8B3A3A'},
    ],
    egg: {k:'egg', n:'종합 구매의사·재방문'}
  },
  convenience: {
    emoji:'🏪', label:'편의점',
    grains: [
      {k:'taste',  n:'맛',       g:'백미', max:10, c:'#D9B65A', bg:'#FBF6EC'},
      {k:'amount', n:'양·포만감', g:'차조', max:7,  c:'#B79A3A', bg:'#E0C158'},
      {k:'value',  n:'가성비',   g:'현미', max:7,  c:'#8C5F30', bg:'#B5824B'},
      {k:'conv',   n:'편의성',   g:'완두콩',max:7,  c:'#6E9636', bg:'#8FB94A'},
    ],
    egg: {k:'egg', n:'재구매의사'}
  },
  market: {
    emoji:'🥕', label:'마켓·농산물',
    grains: [
      {k:'taste', n:'맛',      g:'백미',  max:10, c:'#D9B65A', bg:'#FBF6EC'},
      {k:'fresh', n:'신선도',  g:'검은콩',max:7,  c:'#4A3F73', bg:'#2A2540'},
      {k:'price', n:'가격',    g:'현미',  max:7,  c:'#8C5F30', bg:'#B5824B'},
      {k:'pack',  n:'포장상태',g:'완두콩',max:7,  c:'#6E9636', bg:'#8FB94A'},
    ],
    egg: {k:'egg', n:'재구매의사'}
  }
};
function catAxes(cat){ return (AXES[cat]||AXES.restaurant).grains; }
function catEgg(cat){ return (AXES[cat]||AXES.restaurant).egg; }
function catLabel(cat){ const a=AXES[cat]||AXES.restaurant; return `${a.emoji} ${a.label}`; }

/* ══════════ 상수 ══════════ */
const TAGS = ['혼밥','둘이','여럿이','점심','저녁','야식','1만원이하','데이트','회식'];
const AREA_PRESETS = ['성수','을지로','서울숲','뚝섬'];
const SG_MEMO = 30;

/* ══════════ 상태 ══════════ */
let S = { nick:null, sg:0, view:'home', currentPid:null, wishArea:'',
  places:[], foodRecords:[], wishlist:[], draft:null, loaded:false };
const $ = id => document.getElementById(id);
const root = () => $('viewRoot');

/* ══════════ Firebase Firestore 연동 ══════════ */
const firebaseConfig = {
  apiKey: "AIzaSyD1-2RwUWrWT5D1gGzGLAQHRTZlr8GZeZ8",
  authDomain: "babal-iya.firebaseapp.com",
  projectId: "babal-iya",
  storageBucket: "babal-iya.firebasestorage.app",
  messagingSenderId: "21704089730",
  appId: "1:21704089730:web:fd567c9f8694fd0501949b",
  measurementId: "G-9BC3EZYD13"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// places / foodRecords / wishlist 는 모든 사용자가 공유하는 컬렉션 — 실시간 리스너로 동기화
let placesLoaded = false, foodRecordsLoaded = false, wishlistLoaded = false;
function checkBoot(){
  if(placesLoaded && foodRecordsLoaded && wishlistLoaded && !S.loaded){
    S.loaded = true;
    $('bootNote').style.display = 'none';
    renderHome();
  }
}
function onSharedDataChange(){
  if(!S.loaded) return;
  if(S.view==='write') return; // 입력 중인 화면은 실시간 갱신으로 방해하지 않음
  if(S.view==='placeDetail' && S.currentPid){ openPlace(S.currentPid, true); return; }
  if(S.view==='home') renderHome();
  else if(S.view==='places') renderPlaces();
  else if(S.view==='my') renderMy();
  else if(S.view==='wallet') renderWallet();
  else if(S.view==='wish') renderWishlist();
}
db.collection('places').orderBy('ts','desc').onSnapshot(snap=>{
  S.places = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  placesLoaded = true;
  checkBoot();
  onSharedDataChange();
}, err=>{ console.error(err); toast('장소 목록을 불러오지 못했어요'); });

db.collection('foodRecords').orderBy('ts','desc').onSnapshot(snap=>{
  S.foodRecords = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  foodRecordsLoaded = true;
  checkBoot();
  onSharedDataChange();
}, err=>{ console.error(err); toast('밥알 기록을 불러오지 못했어요'); });

db.collection('wishlist').orderBy('ts','desc').onSnapshot(snap=>{
  S.wishlist = snap.docs.map(d=>({ id:d.id, ...d.data() }));
  wishlistLoaded = true;
  checkBoot();
  onSharedDataChange();
}, err=>{ console.error(err); toast('밥바구니를 불러오지 못했어요'); });

/* ══════════ 집계 ══════════ */
function placeFoodRecords(pid){ return S.foodRecords.filter(r=>r.pid===pid); }
function myFoodRecords(){ return S.foodRecords.filter(r=>r.nick===S.nick); }
function aggScores(pid){
  const p = S.places.find(x=>x.id===pid);
  const axes = catAxes(p?p.cat:'restaurant');
  const rs = placeFoodRecords(pid);
  if(!rs.length) return null;
  const out = {};
  axes.forEach(g=>{
    let sum=0,n=0;
    rs.forEach(r=>{ if(r.scores && r.scores[g.k]){ sum+=r.scores[g.k]; n++; } });
    out[g.k] = n ? sum/n : 0;
  });
  let eggSum=0, eggN=0;
  rs.forEach(r=>{ if(r.scores && typeof r.scores.egg==='number'){ eggSum+=r.scores.egg; eggN++; } });
  out.egg = eggN ? eggSum/eggN : 0;
  return out;
}
function avgAll(pid){
  const p = S.places.find(x=>x.id===pid);
  const axes = catAxes(p?p.cat:'restaurant');
  const a = aggScores(pid);
  if(!a) return 0;
  const fracs = axes.map(g=>{
    if(!(a[g.k]>0)) return null;
    const f = a[g.k]/g.max;
    return g.qualityInverse ? (1-f) : f;
  }).filter(v=>v!==null);
  return fracs.length ? (fracs.reduce((s,v)=>s+v,0)/fracs.length)*5 : 0;
}
function recordQuality(rec, cat){
  const axes = catAxes(cat);
  const fracs = axes.map(g=>{
    const v = rec.scores ? rec.scores[g.k] : 0;
    if(!(v>0)) return null;
    const f = v/g.max;
    return g.qualityInverse ? (1-f) : f;
  }).filter(v=>v!==null);
  return fracs.length ? fracs.reduce((s,v)=>s+v,0)/fracs.length : 0;
}

/* ══════════ 렌더 헬퍼 ══════════ */
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(ts){ const d=new Date(ts); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function dotsHTML(g, val){
  const max = g.max||5;
  const n = Math.round(val||0);
  let h = `<span class="dots">`;
  for(let i=1;i<=max;i++){
    h += `<span class="dg" style="background:${i<=n?g.bg:'transparent'};border-color:${g.c};opacity:${i<=n?1:.25}"></span>`;
  }
  return h+`</span>`;
}
/* ── 색상 유틸 ── */
function hexToRgb(h){ h=(h||'').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16)||0; return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }
function rgbStr(c){ return `rgb(${Math.round(c.r)},${Math.round(c.g)},${Math.round(c.b)})`; }
function lighten(c,a){ return {r:c.r+(255-c.r)*a, g:c.g+(255-c.g)*a, b:c.b+(255-c.b)*a}; }
function darken(c,a){ return {r:c.r*(1-a), g:c.g*(1-a), b:c.b*(1-a)}; }
function desat(c,a){ const y=(c.r*0.3+c.g*0.59+c.b*0.11); return {r:c.r+(y-c.r)*a, g:c.g+(y-c.g)*a, b:c.b+(y-c.b)*a}; }
/* ── 시드 RNG (같은 점수면 항상 같은 낟알 배치 → 리렌더 깜빡임 방지) ── */
function hashSeed(scores, cat){
  const str = (cat||'')+'|'+Object.keys(scores||{}).sort().map(k=>k+':'+scores[k]).join(',');
  let h = 2166136261>>>0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h,16777619); }
  return h>>>0;
}
function mulberry32(a){ return function(){ a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15, 1|a); t=t+Math.imul(t^t>>>7, 61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

let _bowlUID = 0;
/*
 * 봉긋하게 수북이 쌓인 공기밥 SVG.
 * 1) 매끈한 돔(밥 덩어리) 실루엣을 베지어 path로 먼저 그리고
 * 2) 재료 비율로 블렌딩한 색 + radialGradient 명암으로 입체 채움 (clipPath로 돔 안에만)
 * 3) 돔 윗면에만 얕은 낟알 질감을 장식으로 얹음 (큰 사이즈에서만)
 * 흑미(단점) 비율이 높으면 베이스 톤 전체가 어둡고 탁해짐. 계란후라이는 egg===1일 때만 정상부에.
 * size>=70 이면 낟알 디테일 포함(상세용), 작으면 돔+그라데이션만(홈 카드용).
 */
function riceBowlSVG(scores, cat, size){
  size = size || 46;
  scores = scores || {};
  const detail = size >= 70;
  const axes = catAxes(cat);
  const uid = 'rb'+(++_bowlUID);

  // 재료 비율
  const items = axes.map(g=>({ g, w: Math.max(0, Math.min(1, (scores[g.k]||0)/g.max)) }));
  const total = items.reduce((s,x)=>s+x.w, 0);
  const fracs = items.map(x=> total>0 ? x.w/total : 0);
  // 단점(흑미)은 비율이 아니라 그 축 원점수(0~1)로 강도 결정 → 단점 많으면 확실히 시커멓게
  let conW = 0;
  items.forEach(x=>{ if(x.g.qualityInverse) conW = Math.max(conW, x.w); });

  // 베이스 색: 흰쌀(백미)을 캔버스로 두고, 다른 재료들이 비율만큼 살짝 물들임.
  // (8축을 균등 블렌드하면 흰밥이 탁해지므로 백미=맛 축을 바탕색으로 우선)
  let base = hexToRgb('#FBF6EC');
  if(total>0){
    let tr=0,tg=0,tb=0,tw=0;
    items.forEach((x,i)=>{
      if(x.g.k==='taste' || x.g.qualityInverse) return; // 백미 자체·흑미(단점)는 제외
      const c=hexToRgb(x.g.bg); tr+=c.r*fracs[i]; tg+=c.g*fracs[i]; tb+=c.b*fracs[i]; tw+=fracs[i];
    });
    if(tw>0){
      const tint = {r:tr/tw, g:tg/tw, b:tb/tw};
      const strength = Math.min(0.5, tw*0.7); // 다른 재료 비중만큼만 물들임
      base = {r:base.r+(tint.r-base.r)*strength, g:base.g+(tint.g-base.g)*strength, b:base.b+(tint.b-base.b)*strength};
    }
  }
  // 흑미(단점) 많으면 톤 전체를 탁하고 어둡게 (표면 몇 알이 아니라 색감 자체가 침침)
  base = darken(desat(base, conW*0.55), conW*0.5);

  const topCol = lighten(base, 0.62);   // 정상부 하이라이트
  const midCol = base;
  const botCol = darken(base, 0.30);     // 옆면·아랫부분 그림자

  // 기하 (돔이 그릇 테두리 위로 봉긋)
  const cx = size/2;
  const rimY = size*0.58;
  const peakY = size*0.23;
  const rimRx = size*0.40;               // 밥 돔 반너비
  const bulge = size*0.11;               // 밥이 그릇 앞테두리로 볼록 내려온 정도
  const bowlRx = size*0.45;
  const bowlRy = size*0.115;
  const bowlBottomY = size*0.84;
  const leftX = cx - rimRx, rightX = cx + rimRx;
  const round = n => n.toFixed(1);
  const domeTopY = x => peakY + (rimY - peakY)*Math.pow((x-cx)/rimRx, 2); // 낟알 배치용 근사 곡선

  // 밥 돔 실루엣 (정상부 살짝 완만, 뾰족하지 않게)
  const ricePath =
    `M ${round(leftX)} ${round(rimY)} `+
    `C ${round(leftX+rimRx*0.16)} ${round(rimY-(rimY-peakY)*0.80)} ${round(cx-rimRx*0.55)} ${round(peakY+size*0.03)} ${round(cx)} ${round(peakY)} `+
    `C ${round(cx+rimRx*0.55)} ${round(peakY+size*0.03)} ${round(rightX-rimRx*0.16)} ${round(rimY-(rimY-peakY)*0.80)} ${round(rightX)} ${round(rimY)} `+
    `Q ${round(cx)} ${round(rimY+bulge)} ${round(leftX)} ${round(rimY)} Z`;

  // 그릇 컵 실루엣
  const bowlPath =
    `M ${round(cx-bowlRx)} ${round(rimY)} `+
    `C ${round(cx-bowlRx)} ${round(rimY+size*0.20)} ${round(cx-bowlRx*0.5)} ${round(bowlBottomY)} ${round(cx)} ${round(bowlBottomY)} `+
    `C ${round(cx+bowlRx*0.5)} ${round(bowlBottomY)} ${round(cx+bowlRx)} ${round(rimY+size*0.20)} ${round(cx+bowlRx)} ${round(rimY)} `+
    `A ${round(bowlRx)} ${round(bowlRy)} 0 0 1 ${round(cx-bowlRx)} ${round(rimY)} Z`;

  // 돔 윗면 낟알 질감 (장식) + 정상부 반짝임
  let grainsSVG = '';
  if(detail && total>0){
    const rng = mulberry32(hashSeed(scores,cat));
    const pool = [];
    items.forEach((x,i)=>{ let cnt=Math.round(fracs[i]*100); if(x.g.k==='taste') cnt=Math.round(cnt*2.2); for(let j=0;j<cnt;j++) pool.push(x.g); });
    const N = 36;
    for(let k=0;k<N;k++){
      const t = rng()*1.7-0.85;
      const gx = cx + t*rimRx;
      const top = domeTopY(gx);
      const gy = top + Math.pow(rng(),1.5)*(rimY-top)*0.85 + size*0.015;
      const gcol = pool.length? pool[Math.floor(rng()*pool.length)] : items[0].g;
      // 흰쌀 계열은 밝게(하이라이트), 색 재료는 고유색을 살려 섞인 느낌
      const isWhite = gcol.k==='taste';
      const gfill = isWhite ? rgbStr(lighten(hexToRgb(gcol.bg),0.2)) : rgbStr(lighten(hexToRgb(gcol.bg),0.08));
      const gop = isWhite ? 0.5 : 0.62;
      const rot = Math.floor(rng()*360);
      grainsSVG += `<ellipse cx="${round(gx)}" cy="${round(gy)}" rx="${(size*0.046).toFixed(2)}" ry="${(size*0.022).toFixed(2)}" transform="rotate(${rot} ${round(gx)} ${round(gy)})" fill="${gfill}" opacity="${gop}"/>`;
    }
    for(let k=0;k<5;k++){
      const gx = cx + (rng()-0.5)*rimRx;
      const gy = domeTopY(gx) + rng()*size*0.09 + size*0.03;
      grainsSVG += `<circle cx="${round(gx)}" cy="${round(gy)}" r="${(size*0.013).toFixed(2)}" fill="#ffffff" opacity="0.45"/>`;
    }
  }

  // 계란후라이 (돔 곡률에 맞춰 살짝 눌러 얹기)
  let eggSVG = '';
  if(scores.egg===1){
    const ex = cx, ey = peakY + size*0.03;
    const wR = size*0.15, wRy = size*0.098;
    eggSVG = `<g>
      <ellipse cx="${round(ex-size*0.025)}" cy="${round(ey)}" rx="${round(wR)}" ry="${round(wRy)}" fill="#FFFDF7" stroke="#EFE4CC" stroke-width="${(size*0.008).toFixed(2)}"/>
      <ellipse cx="${round(ex+size*0.035)}" cy="${round(ey-size*0.006)}" rx="${round(wR*0.66)}" ry="${round(wRy*0.82)}" fill="#FFFDF7"/>
      <ellipse cx="${round(ex+size*0.006)}" cy="${round(ey)}" rx="${(size*0.056).toFixed(1)}" ry="${(size*0.048).toFixed(1)}" fill="url(#${uid}yolk)"/>
    </g>`;
  }

  return `<svg class="bowl" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <defs>
      <radialGradient id="${uid}dome" cx="50%" cy="24%" r="74%">
        <stop offset="0%" stop-color="${rgbStr(topCol)}"/>
        <stop offset="46%" stop-color="${rgbStr(midCol)}"/>
        <stop offset="100%" stop-color="${rgbStr(botCol)}"/>
      </radialGradient>
      <linearGradient id="${uid}bowl" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FDFBF6"/>
        <stop offset="100%" stop-color="#E4D5BB"/>
      </linearGradient>
      <radialGradient id="${uid}yolk" cx="38%" cy="34%" r="66%">
        <stop offset="0%" stop-color="#FFDC7A"/>
        <stop offset="58%" stop-color="#F5B400"/>
        <stop offset="100%" stop-color="#DE9700"/>
      </radialGradient>
      <clipPath id="${uid}clip"><path d="${ricePath}"/></clipPath>
    </defs>
    <path d="${bowlPath}" fill="url(#${uid}bowl)" stroke="#D6C39E" stroke-width="${(size*0.018).toFixed(2)}"/>
    <ellipse cx="${round(cx)}" cy="${round(rimY)}" rx="${round(bowlRx)}" ry="${round(bowlRy)}" fill="#E6D7BD"/>
    <path d="${ricePath}" fill="url(#${uid}dome)"/>
    <path d="M ${round(leftX)} ${round(rimY)} Q ${round(cx)} ${round(rimY+bulge)} ${round(rightX)} ${round(rimY)}" fill="none" stroke="rgba(85,58,24,0.16)" stroke-width="${(size*0.022).toFixed(2)}"/>
    <g clip-path="url(#${uid}clip)">${grainsSVG}${conW>0.05?`<path d="${ricePath}" fill="rgba(18,13,9,${(conW*0.45).toFixed(2)})"/>`:''}</g>
    ${eggSVG}
  </svg>`;
}
function recordCardBody(rec, place){
  const cat = place?place.cat:'restaurant';
  return `<div style="display:flex;gap:12px;align-items:flex-start">
    ${riceBowlSVG(rec.scores, cat, 44)}
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:13.5px">${esc(rec.menu||'메뉴 미상')}</span>
        <span style="font-size:10.5px;color:var(--soft);flex-shrink:0">${fmt(rec.ts)}</span>
      </div>
      <div style="font-size:10.5px;color:var(--soft);margin-top:2px">🍙 <b style="color:var(--gochu)">${esc(rec.nick)}</b></div>
      ${(rec.tags&&rec.tags.length)?`<div style="margin-top:5px;font-size:10.5px;color:var(--soft)">${rec.tags.map(t=>'#'+esc(t)).join(' ')}</div>`:''}
      ${rec.memo?`<div class="memo-line">💬 ${esc(rec.memo)}</div>`:''}
    </div>
  </div>`;
}
function toast(m){ const t=$('toast'); t.innerHTML=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

/* ══════════ 화면: 홈 ══════════ */
function renderHome(){
  const h = new Date().getHours();
  const meal = h<10?'아침':h<14?'점심':h<17?'오후 한 끼':h<21?'저녁':'야식';
  const mine = myFoodRecords();
  const myPids = [...new Set(mine.map(r=>r.pid))];

  let html = `<div class="greet-wrap">
    <div class="greet">밥알이 ${esc(S.nick)}님, 오늘 ${meal}은<br><em>어떤 밥</em>이 당길까요?</div>
    <div class="greet-sub">밥알 ${S.foodRecords.length}개 · 장소 ${S.places.length}곳 · 밥알이 ${new Set(S.foodRecords.map(r=>r.nick)).size}명이 함께 쌓는 중</div>
  </div>`;

  /* 이 동네 밥바구니 미리보기 */
  const areaPref = S.wishArea || '';
  const wishPreview = (areaPref ? S.wishlist.filter(w=>w.area===areaPref) : S.wishlist).slice(0,2);
  if(wishPreview.length){
    html += `<div class="sec-h" style="padding-top:8px"><div class="sec-t" style="font-size:15px;cursor:pointer" onclick="go('wish')">🧺 ${areaPref?esc(areaPref)+' ':''}밥바구니</div><div class="sec-sub" style="cursor:pointer" onclick="go('wish')">전체 보기</div></div>`;
    wishPreview.forEach(w=>{
      html += `<div class="card" style="padding:11px 14px" onclick="go('wish')">
        <div style="font-weight:700;font-size:13px">${esc(w.name)} <span style="font-size:10.5px;color:var(--soft);font-weight:500">· ${esc(w.area||'')}</span></div>
        ${w.reason?`<div style="font-size:11.5px;color:#7a5a2e;margin-top:4px">💬 ${esc(w.reason)}</div>`:''}
      </div>`;
    });
  }

  /* 내 밥기록 */
  html += `<div class="sec-h"><div class="sec-t">🍚 다시 먹고 싶은 내 밥</div><div class="sec-sub" style="cursor:pointer" onclick="go('my')">전체 보기</div></div>`;
  if(!myPids.length){
    html += `<div class="empty"><div class="big">🍚</div>아직 내 밥기록이 없어요.<br><b>첫 밥알</b>을 남기면 여기가 채워져요!</div>
      <div style="padding:0 18px 6px"><button class="btn-p" onclick="go('write')">✍️ 첫 밥알 남기기 (+${SG_MEMO}가마)</button></div>`;
  } else {
    const scored = myPids.map(pid=>{
      const p = S.places.find(x=>x.id===pid);
      const myRecs = mine.filter(r=>r.pid===pid);
      const latest = myRecs[0];
      return { p, latest, q: p?recordQuality(latest, p.cat):0 };
    }).filter(x=>x.p).sort((a,b)=>b.q-a.q).slice(0,3);

    scored.forEach(({p, latest, q})=>{
      const revisit = latest.scores && latest.scores.egg===1;
      html += `<div class="card" onclick="openPlace('${p.id}')">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${riceBowlSVG(latest.scores, p.cat, 44)}
          <div style="flex:1;min-width:0">
            <div class="rname">${esc(p.name)} — ${esc(latest.menu||'')}${revisit?'<span class="badge">재구매 추천</span>':''}</div>
            <div class="rmeta">${catLabel(p.cat)} · ${esc(p.area||'')} · 내 만족도 ${(q*5).toFixed(1)} · ${fmt(latest.ts)}</div>
            ${latest.memo?`<div class="memo-line">💬 ${esc(latest.memo)}</div>`:''}
          </div>
        </div>
      </div>`;
    });
  }

  /* 아직 안 먹어본 공기밥 */
  const notMine = S.places.filter(p=>!myPids.includes(p.id) && placeFoodRecords(p.id).length>0);
  html += `<div class="sec-h"><div class="sec-t">🍱 아직 안 먹어본 공기밥</div><div class="sec-sub" style="cursor:pointer" onclick="go('places')">전체 보기</div></div>`;
  if(!notMine.length){
    html += `<div class="empty">친구들이 밥알을 남기면<br>여기에 <b>새 공기밥</b>이 나타나요.<br><span style="font-size:11px">이 페이지 링크를 친구에게 공유해보세요!</span></div>`;
  } else {
    notMine.sort((a,b)=>avgAll(b.id)-avgAll(a.id)).slice(0,3).forEach(p=>{
      const rs = placeFoodRecords(p.id);
      const ag = aggScores(p.id);
      const who = [...new Set(rs.map(r=>r.nick))];
      const repMenu = rs[0] ? rs[0].menu : '';
      html += `<div class="card" onclick="openPlace('${p.id}')">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${riceBowlSVG(ag||{}, p.cat, 44)}
          <div style="flex:1;min-width:0">
            <div class="rname">${esc(p.name)}${repMenu?' — '+esc(repMenu):''}</div>
            <div class="rmeta">${catLabel(p.cat)} · ${esc(p.area||'')} · 공기밥 ${avgAll(p.id).toFixed(1)}</div>
            <div class="reason">✦ ${who.slice(0,2).map(esc).join('·')}${who.length>2?` 외 ${who.length-2}명`:''}이 밥알 남김</div>
          </div>
        </div>
      </div>`;
    });
  }
  root().innerHTML = html;
}

/* ══════════ 화면: 공기밥(장소) 목록 ══════════ */
function renderPlaces(){
  let html = `<div class="sec-h"><div class="sec-t">🍱 우리가 쌓은 공기밥</div>
    <div class="sec-sub">${S.places.length}곳</div></div>`;
  html += `<div style="padding:0 18px 12px"><button class="btn-s" onclick="promptNewPlace()">+ 새 장소 등록하기</button></div>`;
  if(!S.places.length){
    html += `<div class="empty"><div class="big">🍱</div>아직 등록된 장소가 없어요.<br><b>첫 장소</b>를 등록하고 밥알을 남겨보세요!</div>`;
  } else {
    const sorted = S.places.slice().sort((a,b)=>avgAll(b.id)-avgAll(a.id));
    sorted.forEach(p=>{
      const rs = placeFoodRecords(p.id);
      const ag = aggScores(p.id);
      html += `<div class="card" onclick="openPlace('${p.id}')">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${riceBowlSVG(ag||{}, p.cat, 44)}
          <div style="flex:1;min-width:0">
            <div class="rname">${esc(p.name)}${rs.length?`<span class="badge g">밥알 ${rs.length}</span>`:''}</div>
            <div class="rmeta">${catLabel(p.cat)} · ${esc(p.area||'')} ${rs.length?`· 공기밥 ${avgAll(p.id).toFixed(1)}`:'· 아직 밥알 없음'}</div>
          </div>
        </div>
      </div>`;
    });
  }
  root().innerHTML = html;
}

/* ══════════ 화면: 장소 상세 ══════════ */
function openPlace(pid, keepScroll){
  const p = S.places.find(x=>x.id===pid);
  if(!p) return;
  S.view = 'placeDetail';
  S.currentPid = pid;
  const rs = placeFoodRecords(pid);
  const ag = aggScores(pid);
  const eggConf = catEgg(p.cat);

  let html = `<div class="pad" style="padding-bottom:4px">
    <span style="font-size:13px;color:var(--soft);font-weight:700;cursor:pointer" onclick="go('places')">← 공기밥</span>
  </div>
  <div class="pad" style="padding-top:6px">
    <div style="background:linear-gradient(160deg,var(--gochu),var(--gochu2));border-radius:20px;padding:20px;color:#fff;box-shadow:var(--sh2)">
      <div style="font-family:'Jua';font-size:22px">${esc(p.name)}</div>
      <div style="font-size:12px;opacity:.85;margin-top:3px">${catLabel(p.cat)} · ${esc(p.area||'')}</div>
      <div style="font-family:'Jua';font-size:38px;margin-top:8px">${rs.length?avgAll(pid).toFixed(1):'–'}<span style="font-size:14px;opacity:.8"> / 5.0 공기밥</span></div>
    </div>
  </div>`;

  if(ag){
    html += `<div class="pad" style="padding-top:0"><div style="background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px">`;
    catAxes(p.cat).forEach(g=>{
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--line)">
        <span style="font-weight:700;font-size:13px">${g.n} <span style="font-size:10px;color:var(--soft);font-weight:500">${g.g}</span></span>
        ${dotsHTML(g, ag[g.k])}</div>`;
    });
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0">
      <span style="font-weight:700;font-size:13px">🍳 ${eggConf.n}</span>
      <span style="font-family:'Jua';font-size:14px;color:var(--gochu)">${Math.round((ag.egg||0)*100)}%</span>
    </div>`;
    html += `</div></div>`;
  }

  html += `<div style="padding:0 18px 8px"><button class="btn-p" onclick="startWrite('${pid}')">🍙 이 장소에서 새 메뉴 기록하기</button></div>
  <div style="padding:0 18px 12px" class="btn-row">
    <button class="btn-s" style="background:#E8F3DA;color:#2b6b1e" onclick="naverSearch('${pid}')">🗺️ 네이버지도 보기</button>
    <button class="btn-s" style="background:#E8F0FB;color:#2a5ab5" onclick="naverRoute('${pid}')">🚶 길찾기</button>
  </div>`;
  html += `<div class="sec-h" style="padding-top:4px"><div class="sec-t">밥알 ${rs.length}개</div></div>`;

  if(!rs.length){
    html += `<div class="empty">첫 밥알을 남기면 <b>+${SG_MEMO}가마</b>!</div>`;
  } else {
    rs.forEach(r=>{
      html += `<div class="card" style="cursor:default">${recordCardBody(r, p)}</div>`;
    });
  }
  root().innerHTML = html;
  setActiveTab('places');
  if(!keepScroll) $('scroll').scrollTop = 0;
}

/* ══════════ 화면: 밥알 남기기 ══════════ */
function startWrite(pid){
  S.draft = { pid: pid||null, menu:'', scores:{}, tags:[], memo:'', egg:0 };
  go('write');
}
function renderWrite(){
  if(!S.draft) S.draft = { pid:null, menu:'', scores:{}, tags:[], memo:'', egg:0 };
  const d = S.draft;

    </div>`;

  if(!p){
    html += `<div class="empty" style="padding:16px 0">먼저 장소를 선택하거나<br>새로 등록해줘! 🍱</div>`;
  } else {
    html += `<div class="field"><label>상황 태그 (여러 개 가능)</label>
      <div class="chips" id="wTags">

    axes.forEach(g=>{
      const v = d.scores[g.k]||0;
      html += `<div class="score-row">
        <div class="score-top">
          <span class="score-nm">${g.n}<small>${g.g}</small></span>
          <span class="score-v" id="sv_${g.k}">${v||0}/${g.max}</span>
        </div>
        <div class="gpick" data-k="${g.k}">
          ${Array.from({length:g.max},(_,i)=>i+1).map(i=>`<span class="dg" data-v="${i}" onclick="pickGrain('${g.k}',${i})" style="background:${i<=v?g.bg:'transparent'};border-color:${g.c};opacity:${i<=v?1:.3}"></span>`).join('')}
        </div>
      </div>`;
    });

    html += `</div>
    <div class="field">
      <label>🍳 ${eggConf.n}</label>
      <button type="button" class="egg-btn ${d.egg?'on':''}" onclick="toggleEgg()">
        <span class="egg-ico">🍳</span> <span id="eggLabel">${d.egg?'있음 (구매의사 O)':'없음 (구매의사 X)'}</span>
      </button>
    </div>`;
  }

  html += `<div class="field"><label>밥메모 (1~2줄, 솔직하게)</label>
      <textarea id="wMemo" placeholder="예) 혼자 점심 먹기 편했어요. 제육은 맛있는데 매장이 좀 좁아요." oninput="S.draft.memo=this.value">${esc(d.memo)}</textarea>
    </div>
    <div class="btn-row" style="margin-bottom:8px">
      <button class="btn-s" onclick="submitFoodRecord()">바로 저장 (+${SG_MEMO}가마)</button>
      <button class="btn-p" style="padding:14px;font-size:14px" onclick="aiDiaryComingSoon()">🍚 AI 밥일기 (준비중)</button>

  </div>`;
  root().innerHTML = html;
}
function changeDraftPlace(pid){
  S.draft.pid = pid;
  S.draft.scores = {};
  S.draft.egg = 0;
  renderWrite();
}
function toggleTag(el, t){
  const i = S.draft.tags.indexOf(t);
  if(i>=0){ S.draft.tags.splice(i,1); el.classList.remove('on'); }
  else { S.draft.tags.push(t); el.classList.add('on'); }
}
function pickGrain(k, v){
  S.draft.scores[k] = v;
  const p = S.places.find(x=>x.id===S.draft.pid);
  const g = catAxes(p?p.cat:'restaurant').find(x=>x.k===k);
  $('sv_'+k).textContent = v+'/'+g.max;
  document.querySelectorAll(`.gpick[data-k="${k}"] .dg`).forEach((el,i)=>{
    const on = (i+1)<=v;
    el.style.background = on ? g.bg : 'transparent';
    el.style.opacity = on ? 1 : .3;
  });
}
function toggleEgg(){
  S.draft.egg = S.draft.egg ? 0 : 1;
  const btn = document.querySelector('.egg-btn');
  if(btn){
    btn.classList.toggle('on', !!S.draft.egg);
    const lbl = $('eggLabel');
    if(lbl) lbl.textContent = S.draft.egg ? '있음 (구매의사 O)' : '없음 (구매의사 X)';
  }
}
function aiDiaryComingSoon(){
  toast('🍚 AI 밥일기 기능은 준비 중이에요!');
}
async function promptNewPlace(fromWrite, prefill){
  const name = prompt('장소 이름을 알려줘 🍚', (prefill&&prefill.name)||'');
  if(!name || !name.trim()) return;
  const catChoice = prompt('카테고리를 골라줘\n1) 🍚 식당\n2) 🏪 편의점\n3) 🥕 마켓·농산물', '1');
  const cat = catChoice==='2' ? 'convenience' : catChoice==='3' ? 'market' : 'restaurant';
  const area = prompt('동네는? (예: 성수, 을지로)', (prefill&&prefill.area)||'') || '';
  const data = { name:name.trim().slice(0,30), cat, area:area.trim().slice(0,15), addedBy:S.nick, ts:Date.now() };
  try{
    const ref = await db.collection('places').add(data);
    const p = { id:ref.id, ...data };
    if(!S.places.find(x=>x.id===p.id)) S.places.unshift(p);
    toast(`${esc(p.name)} 등록 완료! 🍱`);
    if(fromWrite){ S.draft.pid = p.id; renderWrite(); }
    else renderPlaces();
  }catch(e){
    console.error(e);
    toast('저장 실패, 다시 시도해줘');
  }
}

/* ══════════ 음식기록 제출 ══════════ */
async function submitFoodRecord(){
  const d = S.draft;
  if(!d.pid){ toast('장소를 선택해줘! 🍱'); return; }
  const p = S.places.find(x=>x.id===d.pid);
  if(!p){ toast('장소 정보를 찾을 수 없어요'); return; }
  d.menu = ($('wMenu')?$('wMenu').value:d.menu||'').trim();
  if(!d.menu){ toast('먹은 메뉴 이름을 적어줘! 🍽️'); return; }
  const axes = catAxes(p.cat);
  const total = axes.reduce((s,g)=>s+(d.scores[g.k]||0),0);
  if(total===0){ toast('밥알을 하나라도 매겨줘! 🍚'); return; }
  d.memo = ($('wMemo')?$('wMemo').value:d.memo||'').trim();

  const scores = {...d.scores};
  scores.egg = d.egg ? 1 : 0;
  const rec = { pid:d.pid, menu:d.menu.slice(0,30), nick:S.nick, scores, tags:[...d.tags], memo:d.memo, ts:Date.now() };

  try{
    const ref = await db.collection('foodRecords').add(rec);
    rec.id = ref.id;
  }catch(e){
    console.error(e);
    toast('저장 실패 — 네트워크 확인 후 다시 시도해줘');
    return;
  }

  if(!S.foodRecords.find(x=>x.id===rec.id)) S.foodRecords.unshift(rec);
  S.sg += SG_MEMO;
  localStorage.setItem('bab2:sg', String(S.sg));
  updateTop();
  S.draft = null;
  toast(`밥알 남겼다! <b style="color:#E8C36A">+${SG_MEMO}가마</b> 🌾`);
  openPlace(rec.pid);
}

function onWishAreaChange(v){
  if(v==='__custom'){
    const custom = prompt('동네를 입력해줘', S.wishArea||'');
    if(custom && custom.trim()){
      S.wishArea = custom.trim().slice(0,15);
      localStorage.setItem('bab2:lastArea', S.wishArea);
    }
    renderWishlist();
    return;
  }
  S.wishArea = v;
  localStorage.setItem('bab2:lastArea', v);
  renderWishlist();
}
async function promptNewWish(){
  const name = prompt('가고 싶은 곳 이름을 알려줘 🧺 (예: 을지로 한국관)');
  if(!name || !name.trim()) return;
  const area = prompt('동네는? (예: 을지로)', S.wishArea||'') || '';
  const reason = prompt('왜 가고 싶어? 🍙\n예: 여자친구랑 가고 싶어 💕 / 부모님이랑 가고 싶어 👨‍👩‍👧', '') || '';
  const data = { name:name.trim().slice(0,30), area:area.trim().slice(0,15), reason:reason.trim().slice(0,60), nick:S.nick, ts:Date.now() };
  try{
    const ref = await db.collection('wishlist').add(data);
    const w = { id:ref.id, ...data };
    if(!S.wishlist.find(x=>x.id===w.id)) S.wishlist.unshift(w);
    toast(`${esc(w.name)} 밥바구니에 담았어요! 🧺`);
    renderWishlist();
  }catch(e){
    console.error(e);
    toast('저장 실패, 다시 시도해줘');
  }

async function deleteWish(id){
  if(!confirm('이 밥바구니 항목을 삭제할까요?')) return;
  try{ await db.collection('wishlist').doc(id).delete(); }catch(e){ console.error(e); }
  S.wishlist = S.wishlist.filter(x=>x.id!==id);
  renderWishlist();
}
async function markWishVisited(id){
  const w = S.wishlist.find(x=>x.id===id);
  if(!w) return;
  try{ await db.collection('wishlist').doc(id).delete(); }catch(e){ console.error(e); }
  S.wishlist = S.wishlist.filter(x=>x.id!==id);
  toast(`${esc(w.name)} 다녀왔군요! 🍚 밥알을 남겨볼까요?`);
  startWrite(null);
  await promptNewPlace(true, { name:w.name, area:w.area });
}

/* ══════════ 네이버지도 연동 (URL) ══════════ */

}
function naverSearch(pid){
  const p = S.places.find(x=>x.id===pid);

  window.open(naverUrlFor(p.name, p.area), '_blank');
}
function naverRoute(pid){
  const p = S.places.find(x=>x.id===pid);
  if(!p) return;
  window.open(naverUrlFor(p.name, p.area), '_blank');
  toast('네이버지도에서 길찾기를 눌러줘 🗺️');
}
function naverSearchWish(id){
  const w = S.wishlist.find(x=>x.id===id);
  if(!w) return;
  window.open(naverUrlFor(w.name, w.area), '_blank');
}

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.v===v));

function go(v){
  S.view = v;

(function init(){
  S.nick = localStorage.getItem('bab2:nick');
  S.sg = parseInt(localStorage.getItem('bab2:sg')||'0', 10) || 0;
  S.wishArea = localStorage.getItem('bab2:lastArea') || '';

  if(!S.nick){
    let n2 = null;
    while(!n2 || !n2.trim()){
      n2 = prompt('안녕하세요 밥알이 여러분! 🍙\n닉네임을 정해줘 (친구들에게 보여요)','');
      if(n2===null){ n2='손님'+Math.floor(Math.random()*1000); break; }
    }
    S.nick = n2.trim().slice(0,12);
    localStorage.setItem('bab2:nick', S.nick);
  }
  updateTop();
  // 목록 렌더는 Firestore 최초 스냅샷(placesLoaded && foodRecordsLoaded && wishlistLoaded) 도착 시 checkBoot()에서 실행됨
})();
</script>
